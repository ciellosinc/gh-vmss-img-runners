# =============================================================================
# TERRAFORM CI - Pull Request Validation
# =============================================================================
# Validates Terraform code on pull requests
# - Format checking (terraform fmt)
# - Validation (terraform validate)
# - Security scanning (tfsec)
# - Cost estimation (optional infracost)
# - Plan preview for all environments
#
# This workflow runs on every PR that modifies Terraform files
# =============================================================================

name: Terraform CI

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-*.yml'

  push:
    branches:
      - main
    paths:
      - 'terraform/**'

env:
  TERRAFORM_VERSION: '1.9.8'
  TF_IN_AUTOMATION: 'true'
  ARM_USE_OIDC: true
  ARM_USE_AZUREAD: true
  WORKING_DIRECTORY: 'terraform'

permissions:
  id-token: write
  contents: read
  pull-requests: write
  security-events: write
  # Required by codeql-action/upload-sarif@v3 — it reads workflow-run metadata
  # for SARIF fingerprinting. Without it: "Resource not accessible by integration".
  actions: read

# GHA's default Linux bash is `set -e` without `pipefail`, which silently swallows
# `terraform plan | tee plan-output.txt` failures (the pipeline exit code becomes
# tee's, always 0). Set pipefail at the workflow level so any piped step fails
# loudly. See .claude/Docs/Tracking/2026-06-01-ci-pipefail-gap-rca-pr22.md.
defaults:
  run:
    shell: bash --noprofile --norc -eo pipefail {0}

jobs:
  # ===========================================================================
  # Format and Lint Check
  # ===========================================================================
  format:
    name: Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Terraform Format Check
        id: fmt
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          echo "## Format Check Results" >> $GITHUB_STEP_SUMMARY
          if terraform fmt -check -recursive -diff; then
            echo "All Terraform files are properly formatted" >> $GITHUB_STEP_SUMMARY
          else
            echo "::error::Terraform files are not properly formatted. Run 'terraform fmt -recursive' to fix."
            echo "Some files need formatting. Run 'terraform fmt -recursive' locally." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

  # ===========================================================================
  # Validation
  # ===========================================================================
  validate:
    name: Validate
    runs-on: ubuntu-latest
    needs: format

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init (local backend for validation)
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: terraform init -backend=false

      - name: Terraform Validate
        id: validate
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          echo "## Validation Results" >> $GITHUB_STEP_SUMMARY
          if terraform validate -json | tee validate.json; then
            echo "Terraform configuration is valid" >> $GITHUB_STEP_SUMMARY
          else
            echo "::error::Terraform validation failed"
            echo "Validation errors found" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

  # ===========================================================================
  # Security Scan with tfsec
  # ===========================================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: ${{ env.WORKING_DIRECTORY }}
          soft_fail: true
          format: sarif
          # tfsec-action doesn't accept an `out` input; pass --out via additional_args.
          # Runs from /github/workspace (repo root on host), so tfsec.sarif lands there.
          additional_args: --out tfsec.sarif

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v3
        # Non-blocking: fails silently when Code Scanning isn't enabled on the repo
        # (requires GHAS on private repos). The tfsec scan itself still runs in the
        # subsequent "Run tfsec (summary output)" step, so findings are visible
        # inline in the job log even without the Security tab dashboard.
        continue-on-error: true
        if: always()
        with:
          sarif_file: tfsec.sarif

      - name: Run tfsec (summary output)
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: ${{ env.WORKING_DIRECTORY }}
          soft_fail: true

  # ===========================================================================
  # Plan Preview (Dev Environment)
  # ===========================================================================
  plan-dev:
    name: Plan (Dev)
    runs-on: ubuntu-latest
    needs: [validate, security]
    environment: dev-plan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIRECTORY }}
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ vars.TFSTATE_RESOURCE_GROUP_NAME || 'rg-terraform-state' }}" \
            -backend-config="storage_account_name=${{ vars.TFSTATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ vars.TFSTATE_CONTAINER_NAME || 'tfstate' }}" \
            -backend-config="key=ghrunners/dev/terraform.tfstate" \
            -backend-config="use_azuread_auth=true"

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.WORKING_DIRECTORY }}
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_vmss_admin_password: ${{ secrets.VMSS_ADMIN_PASSWORD }}
          TF_VAR_github_private_key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          TF_VAR_github_pat: ${{ secrets.GH_PAT }}
          TF_VAR_github_app_id: ${{ secrets.GH_APP_ID }}
          TF_VAR_github_installation_id: ${{ secrets.GH_INSTALLATION_ID }}
          TF_VAR_github_organization: ${{ secrets.GH_ORGANIZATION }}
          TF_VAR_github_secrets_pat: ${{ secrets.GH_SECRETS_PAT }}
          TF_VAR_github_image_builder_pat: ${{ secrets.GH_IMAGE_BUILDER_PAT }}
        run: |
          terraform plan \
            -var-file=environments/dev.tfvars \
            -out=tfplan-dev \
            -no-color 2>&1 | tee plan-output.txt

          # Create plan summary
          echo "## Dev Environment Plan" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E "^(Plan:|No changes|Error)" plan-output.txt >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Comment PR with Plan
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('${{ env.WORKING_DIRECTORY }}/plan-output.txt', 'utf8');

            // Truncate if too long
            const maxLength = 60000;
            let output = planOutput.length > maxLength
              ? planOutput.substring(0, maxLength) + '\n\n... (truncated)'
              : planOutput;

            const body = `## Terraform Plan - Dev Environment

            <details>
            <summary>Show Plan Output</summary>

            \`\`\`hcl
            ${output}
            \`\`\`

            </details>

            *Workflow Run: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  # ===========================================================================
  # Plan Preview (Test Environment)
  # ===========================================================================
  plan-test:
    name: Plan (Test)
    runs-on: ubuntu-latest
    needs: [validate, security]
    environment: test-plan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIRECTORY }}
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ vars.TFSTATE_RESOURCE_GROUP_NAME || 'rg-terraform-state' }}" \
            -backend-config="storage_account_name=${{ vars.TFSTATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ vars.TFSTATE_CONTAINER_NAME || 'tfstate' }}" \
            -backend-config="key=ghrunners/test/terraform.tfstate" \
            -backend-config="use_azuread_auth=true"

      - name: Terraform Plan
        working-directory: ${{ env.WORKING_DIRECTORY }}
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_vmss_admin_password: ${{ secrets.VMSS_ADMIN_PASSWORD }}
          TF_VAR_github_private_key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          TF_VAR_github_pat: ${{ secrets.GH_PAT }}
          TF_VAR_github_app_id: ${{ secrets.GH_APP_ID }}
          TF_VAR_github_installation_id: ${{ secrets.GH_INSTALLATION_ID }}
          TF_VAR_github_organization: ${{ secrets.GH_ORGANIZATION }}
          TF_VAR_github_secrets_pat: ${{ secrets.GH_SECRETS_PAT }}
          TF_VAR_github_image_builder_pat: ${{ secrets.GH_IMAGE_BUILDER_PAT }}
        run: |
          terraform plan \
            -var-file=environments/test.tfvars \
            -no-color 2>&1 | tee plan-output.txt

          echo "## Test Environment Plan" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E "^(Plan:|No changes|Error)" plan-output.txt >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Plan Preview (Prod Environment)
  # ===========================================================================
  plan-prod:
    name: Plan (Prod)
    runs-on: ubuntu-latest
    needs: [validate, security]
    environment: prod-plan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIRECTORY }}
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ vars.TFSTATE_RESOURCE_GROUP_NAME || 'rg-terraform-state' }}" \
            -backend-config="storage_account_name=${{ vars.TFSTATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ vars.TFSTATE_CONTAINER_NAME || 'tfstate' }}" \
            -backend-config="key=ghrunners/prod/terraform.tfstate" \
            -backend-config="use_azuread_auth=true"

      - name: Terraform Plan
        working-directory: ${{ env.WORKING_DIRECTORY }}
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_vmss_admin_password: ${{ secrets.VMSS_ADMIN_PASSWORD }}
          TF_VAR_github_private_key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          TF_VAR_github_pat: ${{ secrets.GH_PAT }}
          TF_VAR_github_app_id: ${{ secrets.GH_APP_ID }}
          TF_VAR_github_installation_id: ${{ secrets.GH_INSTALLATION_ID }}
          TF_VAR_github_organization: ${{ secrets.GH_ORGANIZATION }}
          TF_VAR_github_secrets_pat: ${{ secrets.GH_SECRETS_PAT }}
          TF_VAR_github_image_builder_pat: ${{ secrets.GH_IMAGE_BUILDER_PAT }}
        run: |
          terraform plan \
            -var-file=environments/prod.tfvars \
            -no-color 2>&1 | tee plan-output.txt

          echo "## Prod Environment Plan" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E "^(Plan:|No changes|Error)" plan-output.txt >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Summary
  # ===========================================================================
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [format, validate, security, plan-dev, plan-test, plan-prod]
    if: always()

    steps:
      - name: Generate Summary
        run: |
          echo "## Terraform CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Format | ${{ needs.format.result == 'success' && 'Pass' || 'Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Validate | ${{ needs.validate.result == 'success' && 'Pass' || 'Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security | ${{ needs.security.result == 'success' && 'Pass' || 'Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Plan (Dev) | ${{ needs.plan-dev.result == 'success' && 'Pass' || needs.plan-dev.result == 'skipped' && 'Skipped' || 'Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Plan (Test) | ${{ needs.plan-test.result == 'success' && 'Pass' || needs.plan-test.result == 'skipped' && 'Skipped' || 'Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Plan (Prod) | ${{ needs.plan-prod.result == 'success' && 'Pass' || needs.plan-prod.result == 'skipped' && 'Skipped' || 'Fail' }} |" >> $GITHUB_STEP_SUMMARY
